<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Yatzy — Telegram</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        height: 100%;
        background: var(--tg-theme-bg-color, #1a1a2e);
        color: var(--tg-theme-text-color, #ffffff);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!--
      ══ Ad containers ══════════════════════════════════════════════════════

      Google IMA SDK (rewarded video).
      1. Uncomment the <script> below after getting approved in Google Ad Manager.
      2. Set VITE_AD_PROVIDER=ima and VITE_IMA_AD_TAG_URL=<your tag URL> in .env
    -->
    <!-- <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script> -->
    <div id="ad-container" style="display:none;position:fixed;inset:0;z-index:9999;background:#000;">
      <video id="ad-video" playsinline style="width:100%;height:100%;"></video>
    </div>

    <!--
      Yandex Advertising Network (YAN) — alternative for RU/CIS audience.
      1. Uncomment the <script> below.
      2. Set VITE_AD_PROVIDER=yandex and VITE_YANDEX_BLOCK_ID=<ownerId/blockId> in .env
    -->
    <!-- <script src="https://yandex.ru/ads/system/context.js" async></script> -->
    <div id="ya-ad-container" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.9);"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
